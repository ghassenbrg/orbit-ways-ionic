<ion-content fullscreen class="ow-content">
  <div class="ow-field" [style.background]="fieldBg">
    <ow-starfield [show]="starfield"></ow-starfield>

    <button class="ow-gear" (click)="openSettings()" aria-label="Settings">
      <ion-icon name="settings-outline"></ion-icon>
    </button>

    <div class="ow-screen ow-lobby">
      <!-- Wordmark -->
      <div class="ow-brand">
        <ow-char-orrery [colors]="colors" [tokens]="tokens"></ow-char-orrery>
        <div class="ow-brand-text">
          <h1 [style.text-shadow]="'0 3px 0 ' + shadeB + ', 0 6px 12px rgba(0,0,0,0.4)'">ORBIT WAYS</h1>
          <p>line up 4 · then everything spins!</p>
        </div>
      </div>

      <!-- Mode picker -->
      <div class="ow-actions" *ngIf="!mode">
        <ow-candy-button [color]="colors.B" [full]="true" (press)="choose('local')">🎮 Play Local</ow-candy-button>
        <ow-candy-button [color]="colors.W" [full]="true" (press)="choose('create')">🚀 Create Room</ow-candy-button>
        <ow-candy-button [color]="colors.B" [full]="true" (press)="choose('join')">👋 Join Room</ow-candy-button>
        <p class="ow-hint">Local plays on this device · Create / Join play online</p>
      </div>

      <!-- Form -->
      <div class="ow-form" *ngIf="mode">
        <div class="ow-field-group">
          <label>{{ mode === 'local' ? 'Player 1 name' : 'Your name' }}</label>
          <input class="ow-input" [(ngModel)]="name"
                 [placeholder]="mode === 'join' ? 'guest' : 'commander'" />
        </div>

        <div class="ow-field-group" *ngIf="mode === 'create'">
          <label>Room code (share it!)</label>
          <div class="ow-code-display" [style.color]="colors.W">
            {{ genCode }}<span>SHARE</span>
          </div>
        </div>

        <div class="ow-field-group" *ngIf="mode === 'join'">
          <label>Room code</label>
          <input class="ow-input ow-input-code" [ngModel]="code" placeholder="K7Q2M"
                 maxlength="5" (ngModelChange)="code = $event.toUpperCase(); err = ''" />
        </div>

        <ng-container *ngIf="mode !== 'join'">
          <div class="ow-field-group">
            <label>Rounds to win</label>
            <ow-stepper [(value)]="rounds" [color]="colors.B"></ow-stepper>
          </div>

          <div class="ow-field-group">
            <label>{{ mode === 'local' ? 'Player 1 character' : 'Pick your character' }}</label>
            <div class="ow-char-pick">
              <button type="button" *ngFor="let s of sides" (click)="setSide(s)"
                      [ngStyle]="charBtnStyle(s)">
                <div class="ow-char-art">
                  <ow-piece [side]="s" [tokens]="tokens" [colors]="colors" [size]="50"
                            [idle]="side === s"></ow-piece>
                </div>
                <span>{{ sideLabel(s) }}</span>
              </button>
            </div>
          </div>
        </ng-container>

        <div class="ow-err" *ngIf="err">{{ err }}</div>

        <ow-candy-button [color]="mode === 'join' ? colors.W : colors.B" [full]="true"
                         (press)="go()">
          {{ ctaLabel }}
        </ow-candy-button>

        <button class="ow-back" (click)="back()">← back</button>
      </div>
    </div>
  </div>
</ion-content>
